<div *ngIf="canViewAdminBlocks()"  class="card" (clickOutside)="clickOutside()">
    <div class="card-header pb-0">
        <h4>Commandes</h4>
        <div class="dropdown icon-dropdown">
            <button class="btn dropdown-toggle" type="button" (click)="open()">
                <i class="icon-more-alt"></i>
            </button>
            <div class="dropdown-menu dropdown-menu-end" [class.show]="isopen">
                <a class="dropdown-item" href="javascript:void(0)">Weekly</a>
                <a class="dropdown-item" href="javascript:void(0)">Monthly</a>
                <a class="dropdown-item" href="javascript:void(0)">Yearly</a>
            </div>
        </div>
    </div>
    <div class="card-body pt-0 course-table">
        <div class="table-responsive">
            <table class="table">
                <thead>
                    <tr>
                        <th>Restaurant</th>
                        <th>Prix</th>
                        <th>Produits</th>
                        <th>Statut</th>
                    </tr>
                </thead>
                <tbody>
                    @for( data of commandes; track data){
                    <tr>
                        <td>
                            <div class="d-flex align-items-center gap-2">
                                <div class="flex-shrink-0">
                                    <img [src]="imagesUrl+data.Restaurant.image" width="75" alt="img">
                                </div>
                                <div class="flex-grow-1">
                                    <a>
                                        <h6 class="f-w-500">{{data.date_retrait | date:'dd/MM/yyyy HH:mm'}}</h6>
                                    </a>
                                    <span class="font-light f-w-400 f-13">{{data.Restaurant.nom}}</span>
                                </div>
                            </div>
                        </td>
                        <td>{{data.totalPrice}} €</td>
                        <td>{{ data.items.length }} produits</td>
                        <td>
                            <button class="btn edge-btn f-13 w-100 btn-light-{{get_status_class(data.statut)}}">{{data.statut}}</button>
                        </td>
                    </tr>
                    }
                </tbody>
            </table>
        </div>
    </div>
</div>
