<div class="container-fluid default-dashboard" >
    <div class="row">
        <div class="col-sm-6 col-xl-4">
            <app-top-card />
        </div>
        <div class="col-sm-6 col-xl-7 personnalise" id="bloc-stats-generales">
            <app-project-overview />
        </div>
        
        <div class="col-sm-6 col-xl-5 order-1 order-xl-0 personnalise" id="bloc-dernieres-connexions">
            <app-schedule-time />
        </div>
        <div class="col-12 personnalise" id="bloc-dernieres-notifications">
            <app-notifications />
        </div>
        <div class="col-sm-6 col-xl-6" *ngIf="!cleanInterface">
            <div class="row">
                <div class="col-6 col-sm-12">
                    <app-top-common-chart [data]="TotalClientsData" />
                </div>
                <div class="col-6 col-sm-12">
                    <app-top-common-chart [data]="newProjectData" />
                </div>
            </div>
        </div>
        <div class="col-sm-6 col-xl-5 personnalise" id="bloc-ca-par-sociétés">
            <app-investing />
        </div>
          <div class="col-md-6 col-xl-5 personnalise" id="bloc-ca-par-restaurants">
            <app-total-investment [investment]="true" />
        </div>
        <div class="col-12 col-md-6 personnalise" id="bloc-reservations">
            <app-all-invoices />
        </div>
        <div class="col-12 col-md-5 personnalise" id="bloc-commandes">
            <app-courses-highlighted />
        </div>
      
        <div class="col-md-6 col-xl-3" *ngIf="!cleanInterface">
            <app-task-list />
        </div>
        <div class="col-md-6 col-lg-6 col-xl-7" *ngIf="!cleanInterface">
            <app-monthly-overview />
        </div>
        <div class="col-md-6 col-xl-5" *ngIf="!cleanInterface">
            <app-task-summary />
        </div>
        <div class="col-sm-12 col-xl-2 custom-margin" *ngIf="!cleanInterface">
            <div class="row">
                <div class="col-6 col-xl-12 col-lg-5">
                    <app-total-visit />
                </div>
                <div class="col-6 col-xl-12 col-lg-7">
                    <app-total-earning />
                </div>
            </div>
        </div>
        
    </div>
</div>
