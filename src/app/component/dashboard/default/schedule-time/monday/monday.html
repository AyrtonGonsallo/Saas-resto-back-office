<ul class="activity-update" *ngIf="stats">
    
    @for( data of stats.lastusers; track data){
        <li class="d-flex align-items-center b-l-{{get_status_class(data.Role.priorite)}}" >
            <div class="flex-grow-1"> <span>{{data?.Societe?.titre}}</span>
                <h5>{{data?.Role.titre}}</h5>
                <h6>{{data?.nom}} {{data?.prenom}}</h6>
            </div>
            <div class="flex-shrink-0"> {{data.derniere_connexion | date:'dd/MM/yyyy HH:mm'}}</div>
        </li>
    }
</ul>
