<div class="card custom-table-striped">
  <form class="table-responsive theme-scroollbar">
    <div class="card-body">
      
      <div class="dataTables_wrapper">
        <div class="d-flex justify-content-between p-2">
          <div class="dataTables_length" id="basic-6_length">
            <label
              >Show
              <select name="pageSize" [(ngModel)]="service.pageSize">
                <option [ngValue]="10">10</option>
                <option [ngValue]="15">15</option>
                <option [ngValue]="15">20</option>
                <option [ngValue]="25">25</option>
              </select>
              entries
            </label>
          </div>
          <div class="mb-3 row">
            <label for="table-complete-search" class="col-xs-3 col-sm-auto col-form-label"
              >Search:</label
            >
            <div class="col-xs-3 col-sm-auto">
              <input
                id="table-complete-search"
                type="text"
                class="form-control"
                name="searchTerm"
                [(ngModel)]="service.searchTerm"
                autocomplete="off"
              />
            </div>
            @if(service.loading$ | async){
            <span class="col col-form-label">Loading...</span>
            }
          </div>
        </div>
        <table class="display table table-striped table-hover table-light">
          <thead>
            <tr>
              <th scope="col" sortable="id" (sort)="onSort($event)">ID</th>
              <th scope="col" sortable="societe_id" (sort)="onSort($event)">Société</th>
              <th scope="col" sortable="restaurant_id" (sort)="onSort($event)">Restaurant</th>
              <th scope="col" sortable="reservation_id" (sort)="onSort($event)">Réservation</th>
              <th scope="col" sortable="commande_id" (sort)="onSort($event)">Commande</th>
              <th scope="col" sortable="utilisateur_id" (sort)="onSort($event)">Client</th>
              <th scope="col" sortable="created_at" (sort)="onSort($event)">Date</th>
              <th scope="col" sortable="type" (sort)="onSort($event)">Type</th>
              <th scope="col" sortable="moyen" (sort)="onSort($event)">Moyen</th>
              <th scope="col" sortable="montant" (sort)="onSort($event)">Montant</th>
              <th scope="col" sortable="description" (sort)="onSort($event)">Description</th>
              
              
            </tr>
          </thead>
          <tbody>
            @for(data of tableData$ | async; track data; let i = $index){
            <tr>
              
              <td>
                <ngb-highlight [result]="data.id" [term]="service.searchTerm" />
              </td>
              <td>
                <ngb-highlight [result]="data.Societe.titre" [term]="service.searchTerm" />
              </td>
              <td>
                <ngb-highlight [result]="data.Restaurant.nom" [term]="service.searchTerm" />
              </td>
              <td>
                <div [innerHTML]="get_reservation(data.reservation_id)"></div>
              </td>
              <td>
                <div [innerHTML]="get_commande(data.commande_id)"></div>
              </td>
              <td>
                <ngb-highlight [result]="data.Utilisateur.nom+' '+data.Utilisateur.prenom" [term]="service.searchTerm" />
              </td>
              <td>
                <ngb-highlight [result]="(data.created_at | date:'dd/MM/yyyy HH:mm')" [term]="service.searchTerm" />
              </td>
              <td>
                <ngb-highlight [result]="(data.type)" [term]="service.searchTerm" />
              </td>
               
               <td>
                <ngb-highlight [result]="data.moyen" [term]="service.searchTerm" />
              </td>
              <td>
                <ngb-highlight [result]="data.montant+' €'" [term]="service.searchTerm" />
              </td>
              <td>
                <ngb-highlight [result]="data.description" [term]="service.searchTerm" />
              </td>
              
               
             
              
              
              
            </tr>
            } @empty{
            <tr class="odd">
              <td colspan="8" class="dataTables_empty" style="text-align: center; font-size: 18px">
                No records found
              </td>
            </tr>
            }
          </tbody>
        </table>
        <div class="d-flex justify-content-between p-2">
          <ngb-pagination
            class="ms-3"
            [collectionSize]="( total$ | async)!"
            [(page)]="service.page"
            [pageSize]="service.pageSize"
          />
        </div>
      </div>
    </div>
  </form>

   
</div>
