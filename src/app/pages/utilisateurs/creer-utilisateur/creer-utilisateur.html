<form class="card" [formGroup]="formData" (ngSubmit)="onSubmit()">
    <div class="card-header">
        <h4 class="card-title mb-0">Ajouter un utilisateur</h4>
        
    </div>

    <div class="card-body">
        <div class="row">

            <div class="col-sm-12 col-md-12">
                <div class="mb-3">
                <label class="form-label">Nom <span class="text-danger">*</span></label>
                <input class="form-control" type="text" formControlName="nom" placeholder="Nom">
                <div *ngIf="formData.get('nom')?.touched && formData.get('nom')?.invalid" class="text-danger">
                    Le nom est invalide
                </div>
                </div>
            </div>

            <div class="col-sm-12 col-md-12">
                <div class="mb-3">
                <label class="form-label">Prénom <span class="text-danger">*</span></label>
                <input class="form-control" type="text" formControlName="prenom" placeholder="Prénom">
                <div *ngIf="formData.get('prenom')?.touched && formData.get('prenom')?.invalid" class="text-danger">
                    Le prénom est invalide
                </div>
                </div>
            </div>

            <div class="col-sm-12 col-md-12">
                <div class="mb-3">
                <label class="form-label">Adresse email <span class="text-danger">*</span></label>
                <input class="form-control" type="email" formControlName="email" placeholder="Email">
                <div *ngIf="formData.get('email')?.touched && formData.get('email')?.invalid" class="text-danger">
                    L'adresse email est invalide
                </div>
                </div>
            </div>

            <div class="col-md-12">
                <div class="mb-3">
                <label class="form-label">Téléphone</label>
                <input class="form-control" type="text" formControlName="telephone" placeholder="Téléphone">
                <div *ngIf="formData.get('telephone')?.touched && formData.get('telephone')?.invalid" class="text-danger">
                    Le téléphone est invalide
                </div>
                </div>
            </div>

            <div class="col-sm-12 col-md-12">
                <div class="mb-3">
                <label class="form-label">Mot de passe <span class="text-danger">*</span></label>
                <input class="form-control" type="password" formControlName="mot_de_passe" placeholder="Mot de passe">
                <div *ngIf="formData.get('mot_de_passe')?.touched && formData.get('mot_de_passe')?.invalid" class="text-danger">
                    Le mot de passe est invalide
                </div>
                </div>
            </div>

            <div class="col-sm-12 col-md-12">
                <div class="mb-3">
                <label class="form-label">Confirmation du mot de passe <span class="text-danger">*</span></label>
                <input class="form-control" type="password" formControlName="confirmed_mot_de_passe" placeholder="Confirmez votre mot de passe">
                <div *ngIf="formData.get('mot_de_passe')?.touched && formData.get('mot_de_passe')?.invalid" class="text-danger">
                    Champ requis
                </div>
                <div *ngIf="!checkpasswords()" class="text-danger">
                    Les mots de passe ne correspondent pas
                </div>
                </div>
            </div>

             <div class="col-sm-12 col-md-12">
                <div class="mb-3">
                <label class="form-label">Rôle <span class="text-danger">*</span></label>
                <ng-select [items]="roles" bindLabel="titre" bindValue="id" [multiple]="false" placeholder="choisir un role"
                    formControlName="role_id" />
                <div *ngIf="formData.get('role_id')?.touched && formData.get('role_id')?.invalid" class="text-danger">
                    Le rôle est requis
                </div>
                </div>
            </div>


             <div class="col-sm-12 col-md-12">
                <div class="mb-3">
                <label class="form-label">Société</label>
                <ng-select [items]="societes" bindLabel="titre" bindValue="id" [multiple]="false" placeholder="choisir une société"
                    formControlName="societe_id" />
                <div *ngIf="formData.get('societe_id')?.touched && formData.get('societe_id')?.invalid" class="text-danger">
                    La société est requise
                </div>
                </div>
            </div>

             <div class="col-sm-12 col-md-12">
                <div class="mb-3">
                <label class="form-label">Restaurant</label>
                <ng-select [items]="restaurants" bindLabel="nom" bindValue="id" [multiple]="true" placeholder="choisir un restaurant"
                    formControlName="restaurant_id" />
                <div *ngIf="formData.get('restaurant_id')?.touched && formData.get('restaurant_id')?.invalid" class="text-danger">
                    Le restaurant est requis
                </div>
                </div>
            </div>

        </div>
    </div>

    <div class="card-footer text-end">
        <button class="btn btn-primary" type="submit">Envoyer</button>
    </div>
</form>
