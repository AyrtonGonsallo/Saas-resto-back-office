<form class="card" [formGroup]="formData" (ngSubmit)="onSubmit()">
    <div class="card-header">
        <h4 class="card-title mb-0">Modifier une réservation</h4>
        
    </div>

    <div class="card-body">
        
        <div class="row">
           
            
           

            <div class="date-picker">
                <div class="mb-3 row g-3">
                    
                    <!-- DATE -->
                    <label class="col-sm-3 col-form-label text-sm-start">
                        Date de réservation <span class="text-danger">*</span>
                    </label>
                    <div class="col-xl-9 col-sm-9">
                        <div class="input-group">
                            <input
                            class="form-control digits"
                            placeholder="yyyy-mm-dd"
                            formControlName="date_retrait"
                            ngbDatepicker
                            #d="ngbDatepicker"
                            (click)="d.toggle()"
                            />
                        </div>
                        <div *ngIf="formData.get('date_retrait')?.touched && formData.get('date_retrait')?.invalid" class="text-danger">
                            La date est invalide
                        </div>
                    </div>

                    <!-- TIME -->
                    <label class="col-sm-3 col-form-label text-sm-start">
                        Heure <span class="text-danger">*</span>
                    </label>
                    <div class="col-xl-9 col-sm-9">
                        <ngb-timepicker
                            formControlName="heure_retrait"
                            [spinners]="true"
                            [seconds]="false"
                        ></ngb-timepicker>
                        <div *ngIf="formData.get('heure_retrait')?.touched && formData.get('heure_retrait')?.invalid" class="text-danger">
                            L'heure est invalide
                        </div>
                    </div>
                    
                </div>
            </div>
            


            <div class="col-sm-12 col-md-12">
                <label class="form-label">Statut <span class="text-danger">*</span></label>
            
                <ng-select [items]="statuts" bindLabel="key" bindValue="key" [multiple]="false"
                    placeholder="choisir un statut" formControlName="statut"  />
                    
                    <div *ngIf="formData.get('statut')?.touched && formData.get('statut')?.invalid" class="text-danger">
                    Le statut est invalide
                </div>
            </div>
            

        </div>
    </div>

    <div class="card-footer text-end">
        <button class="btn btn-primary" type="submit">Modifier</button>
    </div>
</form>

<div class="card-body">
    <div class="row">
        
        <div class="col-xl-6 box-col-6 col-sm-6">
            <div class="card bg-primary height_equal">
                <div class="card-body">
                    <div class="d-flex faq-widgets">
                        
                        <div class="flex-grow-1">
                            <h4>{{data.totalPrice}} €</h4>
                        </div>
                        <app-feather-icon icon="file-text" />
                    </div>
                    <div class="d-flex faq-widgets">
                        
                        <div class="flex-grow-1">
                            <div class="text-white" [innerHTML]="data.formule"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-xl-6 box-col-6 col-sm-6">

        </div>
        <div class="col-xl-4 box-col-6 col-sm-6">
            <button class="btn btn-primary" type="button" (click)="recalculer_formule()">Recalculer le prix</button>
        </div>
        
        
    </div>
</div>
