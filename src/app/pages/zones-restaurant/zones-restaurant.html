<div class="card custom-table-striped">
  <form class="table-responsive theme-scroollbar">
    <div class="card-body">
      
      <div class="dataTables_wrapper">
        <div class="d-flex justify-content-between p-2">
          <div class="dataTables_length" id="basic-6_length">
            <label
              >Show
              <select name="pageSize" [(ngModel)]="service.pageSize">
                <option [ngValue]="10">10</option>
                <option [ngValue]="15">15</option>
                <option [ngValue]="15">20</option>
                <option [ngValue]="25">25</option>
              </select>
              entries
            </label>
          </div>
          <div class="mb-3 row">
            <label for="table-complete-search" class="col-xs-3 col-sm-auto col-form-label"
              >Search:</label
            >
            <div class="col-xs-3 col-sm-auto">
              <input
                id="table-complete-search"
                type="text"
                class="form-control"
                name="searchTerm"
                [(ngModel)]="service.searchTerm"
                autocomplete="off"
              />
            </div>
            @if(service.loading$ | async){
            <span class="col col-form-label">Loading...</span>
            }
          </div>
        </div>
        <table class="display table table-striped table-hover table-light">
          <thead>
            <tr>
              <th scope="col" sortable="id" (sort)="onSort($event)">ID</th>
              <th scope="col" sortable="titre" (sort)="onSort($event)">Titre</th>
              <th scope="col" sortable="restaurant_id" (sort)="onSort($event)">Restaurant</th>
              
              <th scope="col">Action</th>
            </tr>
          </thead>
          <tbody>
            @for(data of tableData$ | async; track data; let i = $index){
            <tr>
              
              <td>
                <ngb-highlight [result]="data.id" [term]="service.searchTerm" />
              </td>
              <td>
                <ngb-highlight [result]="data.titre" [term]="service.searchTerm" />
              </td>
              <td>
                <ngb-highlight [result]="data.Restaurant?.nom" [term]="service.searchTerm" />
              </td>
              
              
              <td>
                <ul class="action">
                  <a style="cursor: pointer;" (click)="modifier_data(data.id)"><i class="fa fa-pen font-primary pe-2" ></i></a>
                  <a style="cursor: pointer;" (click)="supprimer_data(data.id)"><i class="fa fa-trash font-danger ps-2" ></i></a>
                </ul>
              </td>
            </tr>
            } @empty{
            <tr class="odd">
              <td colspan="8" class="dataTables_empty" style="text-align: center; font-size: 18px">
                No records found
              </td>
            </tr>
            }
          </tbody>
        </table>
        <div class="d-flex justify-content-between p-2">
          <ngb-pagination
            class="ms-3"
            [collectionSize]="( total$ | async)!"
            [(page)]="service.page"
            [pageSize]="service.pageSize"
          />
        </div>
      </div>
    </div>
  </form>

    <div class="add-task-btn-wrapper">
        <span class="add-task-btn" >
            <button class="btn btn-primary" (click)="redirect_add()">
            <i class="icon-plus"></i> Ajouter une zone</button>
        </span>
    </div>
</div>
