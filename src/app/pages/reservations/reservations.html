<div class="card custom-table-striped">
  <form class="table-responsive theme-scroollbar">
    <div class="card-body">
      
      <div class="dataTables_wrapper">
        <div class="d-flex justify-content-between p-2">
          <div class="dataTables_length" id="basic-6_length">
            <label
              >Show
              <select name="pageSize" [(ngModel)]="service.pageSize">
                <option [ngValue]="10">10</option>
                <option [ngValue]="15">15</option>
                <option [ngValue]="15">20</option>
                <option [ngValue]="25">25</option>
              </select>
              entries
            </label>
          </div>
          <div class="mb-3 row">
            <label for="table-complete-search" class="col-xs-3 col-sm-auto col-form-label"
              >Search:</label
            >
            <div class="col-xs-3 col-sm-auto">
              <input
                id="table-complete-search"
                type="text"
                class="form-control"
                name="searchTerm"
                [(ngModel)]="service.searchTerm"
                autocomplete="off"
              />
            </div>
            @if(service.loading$ | async){
            <span class="col col-form-label">Loading...</span>
            }
          </div>
        </div>
        <table class="display table table-striped table-hover table-light">
          <thead>
            <tr>
              <th scope="col" sortable="id" (sort)="onSort($event)">ID</th>
              <th scope="col" sortable="date_creation" (sort)="onSort($event)">Date de création</th>
              <th scope="col" sortable="date_reservation" (sort)="onSort($event)">Date réservation</th>
              <th scope="col" sortable="client_id" (sort)="onSort($event)">Client</th>
              <th scope="col" sortable="societe_id" (sort)="onSort($event)">Société</th>
              <th scope="col" sortable="restaurant_id" (sort)="onSort($event)">Restaurant</th>
              <th scope="col" sortable="statut" (sort)="onSort($event)">Statut</th>
              <th scope="col" sortable="table_id" (sort)="onSort($event)">Table</th>
              <th scope="col" sortable="nb_couverts" (sort)="onSort($event)">Nb couverts</th>
              <th scope="col" sortable="nombre_de_personnes" (sort)="onSort($event)">Nb personnes</th>
              <th scope="col" sortable="creneau_id" (sort)="onSort($event)">Créneau</th>
              
              <th scope="col">Action</th>
            </tr>
          </thead>
          <tbody>
            @for(data of tableData$ | async; track data; let i = $index){
            <tr>
              <td>
                <ngb-highlight [result]="data.id" [term]="service.searchTerm" />
              </td>
              <td>
                <ngb-highlight [result]="(data.date_creation | date:'dd/MM/yyyy HH:mm')" [term]="service.searchTerm" />
              </td>
              <td>
                <ngb-highlight [result]="(data.date_reservation | date:'dd/MM/yyyy HH:mm')" [term]="service.searchTerm" />
              </td>
              <td>
                <ngb-highlight [result]="data.client.nom + ' ' + data.client.prenom" [term]="service.searchTerm" />
              </td>
              
              <td>
                <ngb-highlight [result]="data.societe.titre" [term]="service.searchTerm" />
              </td>
              <td>
                <ngb-highlight [result]="data.Restaurant.nom" [term]="service.searchTerm" />
              </td>
              <td>
                <ngb-highlight [result]="data.statut" [term]="service.searchTerm" />
              </td>
              <td>
                <ngb-highlight [result]="data.table.numero+ ' - ' + data.table.nb_places+ ' places'" [term]="service.searchTerm" />
              </td>
              <td>
                <ngb-highlight [result]="data.nb_couverts" [term]="service.searchTerm" />
              </td>
              <td>
                <ngb-highlight [result]="data.nombre_de_personnes" [term]="service.searchTerm" />
              </td>
              <td>
                <ngb-highlight [result]="data.creneau.heure_debut + ' - ' + data.creneau.heure_fin" [term]="service.searchTerm" />
              </td>
              
              
              <td>
                <ul class="action">
                  @if(canEdit()) {
                  <a style="cursor: pointer;" (click)="modifier_data(data.id)"><i class="fa fa-pen font-primary pe-2" ></i></a>
                  }
                  @if(canDelete()) {
                  <a style="cursor: pointer;" (click)="supprimer_data(data.id)"><i class="fa fa-trash font-danger ps-2" ></i></a>
                  }
                </ul>
              </td>
            </tr>
            } @empty{
            <tr class="odd">
              <td colspan="8" class="dataTables_empty" style="text-align: center; font-size: 18px">
                No records found
              </td>
            </tr>
            }
          </tbody>
        </table>
        <div class="d-flex justify-content-between p-2">
          <ngb-pagination
            class="ms-3"
            [collectionSize]="( total$ | async)!"
            [(page)]="service.page"
            [pageSize]="service.pageSize"
          />
        </div>
      </div>
    </div>
  </form>

    
</div>
